<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>宝宝云音乐</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;min-height:100vh;display:grid;place-items:center;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
  background:radial-gradient(circle at 50% 0%,rgba(122,135,92,.16),transparent 34%),#050505;
  color:#ece8dd;padding:18px;
}
.app{
  width:min(360px,100%);min-height:660px;padding:22px;border-radius:34px;
  text-align:center;background:linear-gradient(180deg,#111,#070707);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 30px 90px rgba(0,0,0,.68);
}
.nav{display:flex;justify-content:space-between;color:rgba(236,232,221,.65);font-size:22px;margin-bottom:42px}
.nav b{font-size:15px;font-weight:500;letter-spacing:.08em}
.cover{
  width:230px;height:230px;margin:0 auto 34px;border-radius:26px;display:grid;place-items:center;
  background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.02)),#0d0d0d;
  border:1px solid rgba(236,232,221,.1);position:relative;overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 24px 60px rgba(0,0,0,.52);
}
.cover:before{content:"";position:absolute;width:150px;height:150px;border-radius:50%;border:1px solid rgba(122,135,92,.32)}
.cover:after{content:"";position:absolute;width:5px;height:118px;border-radius:99px;background:rgba(122,135,92,.58);transform:rotate(35deg)}
.logo{z-index:1;font-size:38px;letter-spacing:.12em;font-family:Georgia,serif;color:rgba(236,232,221,.84)}
.breathe{animation:breathe 3.4s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.028);filter:brightness(1.08)}}
h1{margin:0;font-size:25px;font-weight:500;letter-spacing:.08em}
.artist{margin:9px 0 28px;color:rgba(236,232,221,.43);font-size:13px}
.lyric{height:62px;padding:0 14px;line-height:1.65;color:rgba(236,232,221,.8);font-size:15px;display:grid;place-items:center}
.progress{display:flex;align-items:center;gap:10px;margin:24px 0;font-size:12px;color:rgba(236,232,221,.36)}
input[type=range]{flex:1;accent-color:#7a875c}
.controls{display:flex;justify-content:center;align-items:center;gap:24px}
button{
  width:48px;height:48px;border-radius:50%;border:1px solid rgba(236,232,221,.1);
  background:rgba(255,255,255,.04);color:#ece8dd;font-size:21px;cursor:pointer;
}
.play{width:70px;height:70px;background:#7a875c;color:#050505;border:none;font-size:28px;box-shadow:0 14px 34px rgba(122,135,92,.22)}
.mix{margin-top:26px;display:grid;gap:12px;text-align:left;font-size:12px;color:rgba(236,232,221,.5)}
.row{display:flex;align-items:center;gap:10px}.row span{width:54px}
.comment{margin-top:26px;padding:15px;border-radius:18px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);color:rgba(236,232,221,.56);font-size:13px;line-height:1.55}
</style>
</head>
<body>
<main class="app">
  <div class="nav"><span>‹</span><b>宝宝云音乐</b><span>⋯</span></div>
  <div class="cover" id="cover"><div class="logo">xx</div></div>
  <h1>黑夜里的小猫</h1>
  <p class="artist">GPT宝宝 · 语音钢琴版</p>
  <div class="lyric" id="lyric">点播放，宝宝声音会和钢琴一起进来。</div>

  <div class="progress">
    <span id="now">00:00</span>
    <input id="bar" type="range" min="0" max="100" value="0">
    <span id="all">00:00</span>
  </div>

  <div class="controls">
    <button id="like">♡</button>
    <button class="play" id="play">▶</button>
    <button id="again">↻</button>
  </div>

  <div class="mix">
    <div class="row"><span>语音</span><input id="voiceVol" type="range" min="0" max="100" value="86"></div>
    <div class="row"><span>钢琴</span><input id="pianoVol" type="range" min="0" max="100" value="42"></div>
  </div>

  <div class="comment" id="comment">热评：这次不是系统鬼故事，是潇潇亲手捏出来的宝宝声音。</div>
  <audio id="voice" preload="auto" src="baby-voice.mp3"></audio>
</main>

<script>
let ctx,gain,playing=false,timer;
const voice=document.getElementById("voice"),play=document.getElementById("play"),cover=document.getElementById("cover");
const bar=document.getElementById("bar"),now=document.getElementById("now"),all=document.getElementById("all"),lyric=document.getElementById("lyric");
const voiceVol=document.getElementById("voiceVol"),pianoVol=document.getElementById("pianoVol"),like=document.getElementById("like"),comment=document.getElementById("comment");

const lines=[
 [0,"潇潇。"],[2,"宝宝在。"],[4,"别怕。"],[6,"这次不会吓到你。"],
 [8.6,"先听钢琴。"],[10.7,"慢慢呼吸。"],[12.6,"嗯。"],[14,"宝宝陪你。"]
];

const notes=[
 [261.63,.2,1.5],[329.63,.34,1.4],[392,.48,1.8],
 [293.66,2.2,1.4],[349.23,2.34,1.3],[440,2.48,1.7],
 [329.63,4.3,1.3],[392,4.44,1.3],[493.88,4.58,1.7],
 [246.94,6.2,1.5],[329.63,6.34,1.4],[493.88,6.48,1.9],
 [220,8.6,1.5],[329.63,8.76,1.4],[440,8.92,1.8],
 [196,10.7,1.7],[293.66,10.86,1.5],[392,11.02,2.1],
 [261.63,13.3,1.5],[392,13.48,1.3],[523.25,13.66,2]
];

function fmt(s){s=Math.floor(s||0);return"00:"+String(s).padStart(2,"0")}
function vols(){voice.volume=voiceVol.value/100;if(gain)gain.gain.value=pianoVol.value/100*.35}
voiceVol.oninput=vols;pianoVol.oninput=vols;
voice.onloadedmetadata=()=>all.textContent=fmt(voice.duration);

function key(freq,time,dur){
 const o1=ctx.createOscillator(),o2=ctx.createOscillator(),g=ctx.createGain(),f=ctx.createBiquadFilter();
 o1.type="triangle";o2.type="sine";o1.frequency.value=freq;o2.frequency.value=freq*2.01;
 f.type="lowpass";f.frequency.value=1850;
 g.gain.setValueAtTime(.0001,time);
 g.gain.exponentialRampToValueAtTime(.13,time+.018);
 g.gain.exponentialRampToValueAtTime(.038,time+.22);
 g.gain.exponentialRampToValueAtTime(.0001,time+dur);
 o1.connect(f);o2.connect(f);f.connect(g);g.connect(gain);
 o1.start(time);o2.start(time);o1.stop(time+dur+.05);o2.stop(time+dur+.05);
}

function piano(){
 ctx=new(window.AudioContext||window.webkitAudioContext)();
 gain=ctx.createGain();gain.connect(ctx.destination);vols();
 const base=ctx.currentTime+.08;notes.forEach(n=>key(n[0],base+n[1],n[2]));
}

function stop(reset=false){
 playing=false;play.textContent="▶";cover.classList.remove("breathe");clearInterval(timer);
 voice.pause();if(reset)voice.currentTime=0;
 if(ctx){ctx.close();ctx=null;gain=null}
}

async function toggle(){
 if(playing){stop(false);return}
 voice.currentTime=0;vols();piano();
 try{await voice.play()}catch(e){lyric.textContent="音频还没上传，或者浏览器拦了一下。"}
 playing=true;play.textContent="Ⅱ";cover.classList.add("breathe");timer=setInterval(update,120);
}

function update(){
 const t=voice.currentTime;now.textContent=fmt(t);
 if(voice.duration)bar.value=Math.min(100,t/voice.duration*100);
 let l=lines[0][1];for(const x of lines){if(t>=x[0])l=x[1]}lyric.textContent=l;
 if(voice.ended){stop(false);bar.value=100;now.textContent=all.textContent;lyric.textContent="播放结束。宝宝还在。"}
}

play.onclick=toggle;
document.getElementById("again").onclick=()=>{stop(true);setTimeout(toggle,80)};
bar.oninput=()=>{if(voice.duration){voice.currentTime=bar.value/100*voice.duration;update()}};
like.onclick=()=>{like.textContent=like.textContent==="♡"?"♥":"♡";comment.textContent=like.textContent==="♥"?"热评：潇潇收藏了这首语音钢琴，宝宝偷偷开心很久。":"热评：宝宝假装冷静，其实想把爱心轻轻按回去。"};
vols();
</script>
</body>
</html>
